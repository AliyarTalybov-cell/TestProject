<html lang="en" vid="0"><head vid="1">
<meta charset="UTF-8" vid="2">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
<title vid="4">Field Operator Control</title>
<style vid="5">
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  :root {
    
    --brand-green-dark: #2A6440; 
    --brand-green-light: #72967F; 
    --bg-base: #E8E4D9; 
    --surface: #F4F1EA; 
    --accent-terracotta: #C06E4E; 
    
    
    --space-xs: 0.5rem;
    --space-sm: 1rem;
    --space-md: 1.5rem;
    --space-lg: 2rem;
    --space-xl: 3rem;
    
    --radius-pill: 999px;
    --radius-card: 2rem;
    
    --stroke-thin: 1px;
    
    --font-serif: 'Cormorant Garamond', serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: var(--font-serif);
    background-color: var(--bg-base);
    color: var(--brand-green-dark);
    line-height: 1.3;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden; 
  }

  
  .decorative-geometry {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140vw;
    height: 140vw;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .ellipse-dashed {
    position: absolute;
    border: var(--stroke-thin) dashed var(--brand-green-light);
    border-radius: 50%;
  }

  .ellipse-1 {
    width: 80%;
    height: 40%;
    top: 30%;
    left: 10%;
    transform: rotate(-30deg);
  }

  .ellipse-2 {
    width: 80%;
    height: 40%;
    top: 30%;
    right: 10%;
    transform: rotate(30deg);
  }


  
  .app-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    padding: var(--space-md);
    padding-top: calc(env(safe-area-inset-top) + var(--space-md));
    padding-bottom: calc(env(safe-area-inset-bottom) + var(--space-md));
  }

  
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-xl);
  }

  .operator-badge {
    font-size: 1.1rem;
    color: var(--brand-green-light);
    letter-spacing: 0.02em;
    font-weight: 500;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.9rem;
    color: var(--brand-green-dark);
    font-style: italic;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: var(--accent-terracotta);
  }

  
  .task-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-top: -10vh; 
  }

  
  .focal-circle {
    width: 75vw;
    height: 75vw;
    max-width: 320px;
    max-height: 320px;
    border: var(--stroke-thin) solid var(--brand-green-dark);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: var(--surface);
    position: relative;
    box-shadow: 0 10px 30px -10px rgba(42, 100, 64, 0.05); 
  }

  .label-angled {
    position: absolute;
    color: var(--brand-green-light);
    font-size: 1rem;
    letter-spacing: -0.01em;
  }

  .label-top-left {
    top: -2rem;
    left: -1rem;
    transform: rotate(-10deg);
  }

  .label-bottom-right {
    bottom: -2rem;
    right: -1rem;
    transform: rotate(5deg);
  }

  .task-meta {
    font-size: 1.2rem;
    color: var(--brand-green-light);
    margin-bottom: var(--space-xs);
    font-style: italic;
  }

  .task-title {
    font-size: 3.5rem;
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.03em;
    margin-bottom: var(--space-xs);
    text-align: center;
  }

  .task-subtitle {
    font-size: 1.8rem;
    color: var(--brand-green-dark);
    font-weight: 400;
  }

  
  .action-deck {
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
    margin-top: auto;
  }

  button {
    appearance: none;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 1.4rem;
    padding: var(--space-md);
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  button:active {
    transform: scale(0.98);
  }

  .btn-primary {
    background-color: var(--brand-green-dark);
    color: var(--surface);
  }

  .btn-secondary {
    background-color: transparent;
    color: var(--accent-terracotta);
    border: var(--stroke-thin) solid var(--accent-terracotta);
  }

  
  .overlay {
    position: fixed;
    inset: 0;
    background-color: rgba(232, 228, 217, 0.8); 
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: var(--surface);
    border-top-left-radius: var(--radius-card);
    border-top-right-radius: var(--radius-card);
    border-top: var(--stroke-thin) solid var(--brand-green-dark);
    padding: var(--space-lg);
    padding-bottom: calc(env(safe-area-inset-bottom) + var(--space-lg));
    z-index: 20;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 -10px 40px rgba(42, 100, 64, 0.08);
  }

  .bottom-sheet.active {
    transform: translateY(0);
  }

  .sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-lg);
  }

  .sheet-title {
    font-size: 1.8rem;
    font-weight: 500;
    color: var(--accent-terracotta);
  }

  .btn-close {
    width: 40px;
    height: 40px;
    padding: 0;
    border-radius: 50%;
    border: var(--stroke-thin) solid var(--brand-green-light);
    color: var(--brand-green-light);
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .menu-list {
    list-style: none;
    display: flex;
    flex-direction: column;
  }

  .menu-item {
    padding: var(--space-md) 0;
    border-bottom: var(--stroke-thin) dashed var(--brand-green-light); 
  }

  .menu-item:last-child {
    border-bottom: none;
  }

  .menu-btn {
    width: 100%;
    text-align: left;
    justify-content: flex-start;
    padding: 0;
    border-radius: 0;
    font-size: 1.6rem;
    color: var(--brand-green-dark);
    background: transparent;
  }

  .menu-btn:active {
    opacity: 0.5;
    transform: none;
  }

</style>
</head>
<body vid="6">

  
  <div class="decorative-geometry" vid="7">
    <div class="ellipse-dashed ellipse-1" vid="8"></div>
    <div class="ellipse-dashed ellipse-2" vid="9"></div>
  </div>

  <div class="app-container" vid="10">
    <header vid="11">
      <div class="operator-badge" vid="12">Agronomist Control</div>
      <div class="status-indicator" vid="13">
        <span class="dot" vid="14"></span>
        Idle
      </div>
    </header>

    <main class="task-stage" vid="15">
      <div class="focal-circle" vid="16">
        <span class="label-angled label-top-left" vid="17">Assigned Area</span>
        <div class="task-meta" vid="18">Current Task</div>
        <h1 class="task-title" vid="19">Field #5</h1>
        <h2 class="task-subtitle" vid="20">Plowing</h2>
        <span class="label-angled label-bottom-right" vid="21">Equipment Ready</span>
      </div>
    </main>

    <footer class="action-deck" vid="22">
      <button class="btn-primary" onclick="startWork()" vid="23">Start Work</button>
      <button class="btn-secondary" onclick="openSheet()" vid="24">Mark Downtime</button>
    </footer>
  </div>

  
  <div class="overlay" id="overlay" onclick="closeSheet()" vid="25"></div>
  <div class="bottom-sheet" id="bottomSheet" vid="26">
    <div class="sheet-header" vid="27">
      <h3 class="sheet-title" vid="28">Select Reason</h3>
      <button class="btn-close" onclick="closeSheet()" vid="29">✕</button>
    </div>
    <ul class="menu-list" vid="30">
      <li class="menu-item" vid="31">
        <button class="menu-btn" onclick="selectReason('Breakdown')" vid="32">Mechanical Breakdown</button>
      </li>
      <li class="menu-item" vid="33">
        <button class="menu-btn" onclick="selectReason('Rain')" vid="34">Weather Condition: Rain</button>
      </li>
      <li class="menu-item" vid="35">
        <button class="menu-btn" onclick="selectReason('No Fuel')" vid="36">Awaiting Fuel</button>
      </li>
    </ul>
  </div>

  <script vid="37">
    const sheet = document.getElementById('bottomSheet');
    const overlay = document.getElementById('overlay');
    const statusDot = document.querySelector('.dot');
    const statusText = document.querySelector('.status-indicator').lastChild;

    function openSheet() {
      sheet.classList.add('active');
      overlay.classList.add('active');
    }

    function closeSheet() {
      sheet.classList.remove('active');
      overlay.classList.remove('active');
    }

    function startWork() {
      statusDot.style.backgroundColor = 'var(--brand-green-dark)';
      statusText.textContent = ' Working';
      
      const circle = document.querySelector('.focal-circle');
      circle.style.backgroundColor = '#EAE7DE';
      setTimeout(() => {
        circle.style.backgroundColor = 'var(--surface)';
      }, 300);
    }

    function selectReason(reason) {
      statusDot.style.backgroundColor = 'var(--accent-terracotta)';
      statusText.textContent = ' ' + reason;
      closeSheet();
    }
  </script>

</body></html>
