<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
    <title vid="4">Agronomist Control - Field Operator</title>
    <style vid="5">
        

        :root {
            
            --bg-env: #2a332a; 
            --surface: #f4f3f0; 
            --ink-primary: #853d3d; 
            --ink-secondary: #5c6358; 
            --ink-tertiary: #a0a69c; 
            
            
            --action-start: #4a6b42; 
            --action-stop: #ad4f39; 
            --action-text: #ffffff;
            
            
            --font-serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
            
            
            --radius-none: 0px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-xxl: 48px;
        }

        
        .texture-paper {
            position: relative;
        }
        .texture-paper::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            z-index: 1;
        }

        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-env);
            color: var(--ink-primary);
            font-family: var(--font-serif);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        
        h1, h2, h3, h4 {
            font-weight: normal;
            margin: 0;
        }

        .label-small {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ink-secondary);
            margin-bottom: var(--spacing-xs);
        }

        .title-large {
            font-size: 2.25rem;
            line-height: 1.1;
            margin-bottom: var(--spacing-sm);
            color: var(--ink-primary);
        }

        .body-large {
            font-size: 1.25rem;
            color: var(--ink-primary);
        }

        
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: var(--spacing-md);
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            padding: var(--spacing-xl) 0;
            text-align: center;
        }

        .header-title {
            color: var(--surface);
            font-size: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        
        .card {
            background-color: var(--surface);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
            position: relative;
            overflow: hidden; 
            
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card > * {
            position: relative;
            z-index: 2;
        }

        .divider {
            height: 1px;
            background-color: var(--ink-tertiary);
            margin: var(--spacing-lg) 0;
            opacity: 0.3;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: var(--spacing-sm);
        }

        
        .action-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            margin-top: auto;
            padding-bottom: var(--spacing-xl);
        }

        button {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            padding: var(--spacing-lg);
            border: none;
            background-color: var(--surface);
            color: var(--ink-primary);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s, opacity 0.2s;
            text-align: center;
        }

        button:active {
            transform: scale(0.98);
        }

        button > * {
            position: relative;
            z-index: 2;
        }

        .btn-primary {
            background-color: var(--action-start);
            color: var(--action-text);
        }

        .btn-danger {
            background-color: var(--action-stop);
            color: var(--action-text);
        }

        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(26, 31, 26, 0.9); 
            backdrop-filter: blur(2px);
            z-index: 100;
            display: flex;
            align-items: flex-end; 
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--surface);
            width: 100%;
            padding: var(--spacing-xl) var(--spacing-md);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid rgba(133, 61, 61, 0.2);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--ink-primary);
            font-size: 2rem;
            line-height: 1;
            padding: 0 var(--spacing-sm);
            margin: -10px;
        }

        .menu-list {
            list-style: none;
        }

        .menu-list li {
            border-bottom: 1px solid rgba(133, 61, 61, 0.1);
        }

        .menu-list li:last-child {
            border-bottom: none;
        }

        .menu-list button {
            width: 100%;
            text-align: left;
            padding: var(--spacing-lg) var(--spacing-sm);
            background: none;
            font-size: 1.25rem;
            color: var(--ink-primary);
        }

        .menu-list button:active {
            background-color: rgba(133, 61, 61, 0.05);
            transform: none;
        }
    </style>
</head>
<body vid="6">

    <div class="app-container" vid="7">
        <header vid="8">
            <div class="header-title" vid="9">Logbook: Operator 04</div>
        </header>

        <main vid="10">
            
            <div class="card texture-paper" vid="11">
                <div class="label-small" vid="12">Current Assignment</div>
                <h1 class="title-large" vid="13">Field #5</h1>
                
                <div class="divider" vid="14"></div>
                
                <div class="info-row" vid="15">
                    <span class="label-small" vid="16">Operation</span>
                    <span class="body-large" vid="17">Plowing</span>
                </div>
                <div class="info-row" style="opacity: 0.7;" vid="18">
                    <span class="label-small" vid="19">Target Area</span>
                    <span class="body-large" vid="20">120 ha</span>
                </div>
            </div>

            
            <div class="action-group" vid="21">
                <button class="btn-primary texture-paper" onclick="toggleState(this)" vid="22">
                    <span vid="23">Start Work</span>
                </button>
                
                <button class="btn-danger texture-paper" onclick="openModal()" vid="24">
                    <span vid="25">Mark Downtime</span>
                </button>
            </div>
        </main>
    </div>

    
    <div class="modal-overlay" id="downtimeModal" vid="26">
        <div class="modal-content texture-paper" vid="27">
            <div class="modal-header" vid="28">
                <h2 class="body-large" vid="29">Select Reason</h2>
                <button class="close-btn" onclick="closeModal()" vid="30">×</button>
            </div>
            
            <ul class="menu-list" vid="31">
                <li vid="32"><button onclick="selectReason('Breakdown')" vid="33">Mechanical Breakdown</button></li>
                <li vid="34"><button onclick="selectReason('Rain')" vid="35">Weather: Rain</button></li>
                <li vid="36"><button onclick="selectReason('No Fuel')" vid="37">Awaiting Fuel</button></li>
                <li vid="38"><button onclick="selectReason('Other')" vid="39">Other (Add Note)</button></li>
            </ul>
        </div>
    </div>

    <script vid="40">
        
        function toggleState(btn) {
            const span = btn.querySelector('span');
            if (span.innerText === 'Start Work') {
                span.innerText = 'Pause Work';
                btn.style.backgroundColor = 'var(--ink-secondary)';
            } else {
                span.innerText = 'Start Work';
                btn.style.backgroundColor = 'var(--action-start)';
            }
        }

        const modal = document.getElementById('downtimeModal');

        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function selectReason(reason) {
            
            console.log('Selected:', reason);
            closeModal();
            
            document.querySelector('.btn-primary span').innerText = 'Resume Work';
            document.querySelector('.btn-primary').style.backgroundColor = 'var(--ink-secondary)';
        }

        
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>

</body></html>
