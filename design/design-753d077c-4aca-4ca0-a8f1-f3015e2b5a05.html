<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Agronomist Control - Field Operator</title>
    <style vid="5">
        

        :root {
            --bg-solid-green: #415441;
            --bg-deep-shadow: #19211A;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-danger: #9A5B4C; 
            --accent-danger-active: #7A4539;
            --btn-active-overlay: rgba(0, 0, 0, 0.15);
            
            --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Helvetica Neue", sans-serif;
            --font-accent: "Georgia", "Times New Roman", serif; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep-shadow);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.3;
            
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        
        .top-bar {
            padding: 24px 24px 16px;
            background-color: var(--bg-solid-green);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .location {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .location svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        .barcode-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .barcode-lines {
            display: flex;
            height: 24px;
            align-items: stretch;
            gap: 2px;
        }

        .barcode-line {
            background-color: var(--text-primary);
        }
        
        
        .barcode-line:nth-child(1) { width: 2px; }
        .barcode-line:nth-child(2) { width: 4px; }
        .barcode-line:nth-child(3) { width: 1px; }
        .barcode-line:nth-child(4) { width: 3px; }
        .barcode-line:nth-child(5) { width: 1px; }
        .barcode-line:nth-child(6) { width: 2px; }
        .barcode-line:nth-child(7) { width: 5px; }
        .barcode-line:nth-child(8) { width: 1px; }
        .barcode-line:nth-child(9) { width: 3px; }
        .barcode-line:nth-child(10) { width: 2px; }
        .barcode-line:nth-child(11) { width: 1px; }
        .barcode-line:nth-child(12) { width: 4px; }
        .barcode-line:nth-child(13) { width: 2px; }
        .barcode-line:nth-child(14) { width: 1px; }
        .barcode-line:nth-child(15) { width: 3px; }

        .barcode-text {
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: lowercase;
            color: var(--text-primary);
        }

        
        .main-task {
            flex: 1;
            background-color: var(--bg-solid-green);
            padding: 32px 24px;
            position: relative;
            
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        
        .geometry-circle {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 2px solid var(--bg-solid-green); 
            background-color: var(--bg-deep-shadow); 
            bottom: -60px;
            right: -80px;
            pointer-events: none;
            z-index: 0;
            
            box-shadow: inset 20px 20px 40px rgba(0,0,0,0.5);
        }

        .task-content {
            position: relative;
            z-index: 1; 
        }

        .task-pretitle {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: -4px;
        }

        .task-accent {
            font-family: var(--font-accent);
            font-style: italic;
            font-size: 36px;
            font-weight: 400;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .task-id {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .task-type {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 32px;
        }

        
        .task-details {
            font-size: 11px;
            line-height: 1.5;
            color: var(--text-secondary);
            max-width: 65%;
            text-align: justify;
        }

        
        .actions-wrapper {
            background-color: var(--bg-deep-shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .btn {
            width: 100%;
            padding: 20px;
            border: none;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.99);
        }

        
        .btn-primary {
            background-color: var(--text-primary);
            color: var(--bg-deep-shadow);
        }

        .btn-primary:active {
            background-color: #E0E0E0;
        }

        
        .btn-danger {
            background-color: var(--accent-danger);
            color: var(--text-primary);
        }

        .btn-danger:active {
            background-color: var(--accent-danger-active);
        }

        
        
        #downtime-toggle {
            display: none;
        }

        .sheet-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-solid-green);
            
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        #downtime-toggle:checked ~ .sheet-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        #downtime-toggle:checked ~ .bottom-sheet {
            transform: translateY(0);
        }

        .sheet-header {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sheet-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .close-btn {
            color: var(--text-primary);
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
        }

        .reason-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .reason-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .reason-btn {
            width: 100%;
            padding: 24px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 18px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }

        .reason-btn:active {
            background-color: rgba(255,255,255,0.05);
        }

        .reason-btn::after {
            content: '→';
            font-family: monospace;
            opacity: 0.5;
        }

    </style>
</head>
